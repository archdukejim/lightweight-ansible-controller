services:
  controller:
    build: .
    image: lightweight-ansible-controller:latest
    ports:
      - "8443:8443"
    volumes:
      - ./playbooks:/playbooks:ro
      - ./collections:/collections:ro
      - ./inventory:/inventory:ro
      - ./vault:/vault:ro
      # Uncomment to mount custom certs instead of self-signed
      # - ./certs:/certs:ro
    environment:
      # Set to 'true' to bypass OIDC checks (but still uses HTTPS 8443)
      # Set to 'false' for production (requires sidecar auth headers)
      - DEV_MODE=true

  # Example sidecar setup for OIDC (commented out by default)
  # oidc-proxy:
  #   image: quay.io/oauth2-proxy/oauth2-proxy:latest
  #   ports:
  #     - "443:4180"
  #   environment:
  #     OAUTH2_PROXY_UPSTREAMS: "http://controller:8080/"
  #     OAUTH2_PROXY_HTTP_ADDRESS: "0.0.0.0:4180"
  #     OAUTH2_PROXY_SET_XAUTHREQUEST: "true"
  #     OAUTH2_PROXY_PASS_USER_HEADERS: "true"
  #     # Add other proxy configs here: OAUTH2_PROXY_CLIENT_ID, OAUTH2_PROXY_CLIENT_SECRET, etc.
